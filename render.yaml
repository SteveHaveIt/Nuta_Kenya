# Render Blueprint
# https://render.com/docs/blueprint-spec

services:
  # Backend API Service
  - type: web
    name: nuta-kenya-backend
    env: node
    region: oregon
    rootDir: apps/backend
    buildCommand: npm install && npm run build
    startCommand: cd .medusa/server && npx medusa start -H 0.0.0.0
    healthCheckPath: /health
    envVars:
      - key: NODE_VERSION
        value: 20
      - key: NODE_ENV
        value: production
      # Required environment variables
      - key: DATABASE_URL
        sync: false
      - key: REDIS_URL
        value: "redis://default:f2UWJaPhSKLSiz4s0JvtIe82MhD86bdJ@island-preeminent-advice-67905.db.redis.io:15428"
      - key: JWT_SECRET
        generateValue: true
      - key: COOKIE_SECRET
        generateValue: true
      - key: STORE_CORS
        value: "https://nuta.vercel.app,https://nuta-kenya.onrender.com"
      - key: ADMIN_CORS
        value: "https://nuta-kenya.onrender.com"
      - key: AUTH_CORS
        value: "https://nuta.vercel.app,https://nuta-kenya.onrender.com"
